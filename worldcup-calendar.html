<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 世界盃 | 全賽程行事曆</title>
  <style>
    :root {
      --bg: #f3efe5;
      --ink: #0f2236;
      --muted: #637182;
      --card: #ffffff;
      --line: #d7d1c2;
      --hero: #112746;
      --nearby-bg: #d9f1e6;
      --nearby-fg: #0e6245;
      --dallas-bg: #e3edff;
      --dallas-fg: #1f4d88;
      --far-bg: #f6e9d1;
      --far-fg: #7e531a;
      --bracket-bg: #f8fbff;
      --bracket-line: #c4d7f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "PingFang TC", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 90% 8%, #ffdcae 0%, transparent 33%),
        radial-gradient(circle at 8% 92%, #d9e7ff 0%, transparent 34%),
        var(--bg);
    }

    .wrap {
      max-width: 1680px;
      margin: 0 auto;
      padding: 20px 16px 30px;
    }

    .hero {
      background: var(--hero);
      color: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 1.45rem;
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 0;
      color: #d7e2ee;
      line-height: 1.5;
      font-size: 0.94rem;
    }

    .toolbar {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .toolbar label {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .toolbar select {
      border: 1px solid #405a77;
      border-radius: 999px;
      background: #0f1f33;
      color: #fff;
      padding: 8px 12px;
      font-size: 0.9rem;
    }

    .toolbar select:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .meta {
      margin-top: 8px;
      color: #d4dfed;
      font-size: 0.87rem;
    }

    .pane {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(15, 34, 54, 0.06);
      overflow: hidden;
    }

    .pane-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff9ee 0%, #fff 100%);
    }

    .pane-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .pane-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .calendar-scroll {
      overflow: auto;
      max-height: calc(100vh - 220px);
      padding: 12px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(170px, 1fr));
      gap: 10px;
      min-width: 1210px;
    }

    .day {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      min-height: 190px;
      padding: 9px;
    }

    .dow {
      font-size: 0.76rem;
      color: var(--muted);
      margin: 0;
      font-weight: 700;
    }

    .date {
      margin: 4px 0 2px;
      font-size: 0.98rem;
      font-weight: 800;
    }

    .count {
      margin: 0 0 8px;
      font-size: 0.76rem;
      color: var(--muted);
      font-weight: 700;
    }

    .mini {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 6px;
      margin-bottom: 6px;
      font-size: 0.77rem;
      line-height: 1.35;
      background: #fff;
    }

    .mini .m-time { color: var(--muted); font-weight: 700; }
    .mini .m-match { font-weight: 800; margin: 2px 0; }
    .mini .m-ground { color: #2f4255; }

    .more {
      font-size: 0.75rem;
      color: #1d4f8d;
      font-weight: 700;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 9px;
      padding: 8px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .badge {
      margin-top: 6px;
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.71rem;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .nearby { background: var(--nearby-bg); color: var(--nearby-fg); border-color: #b6e0ce; }
    .dallas { background: var(--dallas-bg); color: var(--dallas-fg); border-color: #bfd3fa; }
    .far { background: var(--far-bg); color: var(--far-fg); border-color: #e5cfa9; }

    .bracket-wrap {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(15, 34, 54, 0.06);
      overflow: hidden;
    }

    .bracket-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f2f7ff 0%, #fff 100%);
    }

    .bracket-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .bracket-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .bracket-scroll {
      overflow: auto;
      padding: 12px;
      background: var(--bracket-bg);
    }

    .bracket {
      min-width: 1120px;
      display: grid;
      grid-template-columns: repeat(5, minmax(210px, 1fr));
      gap: 10px;
    }

    .bracket.full {
      min-width: 1320px;
      grid-template-columns: repeat(6, minmax(210px, 1fr));
    }

    .round-col {
      border: 1px solid var(--bracket-line);
      border-radius: 12px;
      background: #fff;
      padding: 8px;
    }

    .round-title {
      margin: 0 0 8px;
      font-size: 0.85rem;
      font-weight: 800;
      color: #264a74;
    }

    .match-card {
      border: 1px solid #d7dfec;
      border-radius: 8px;
      padding: 7px;
      margin-bottom: 7px;
      background: #fff;
      font-size: 0.77rem;
      line-height: 1.3;
    }

    .match-card:last-child { margin-bottom: 0; }
    .match-card .mc-time { color: var(--muted); font-weight: 700; }
    .match-card .mc-teams { font-weight: 800; margin: 2px 0; font-size: 0.82rem; }
    .match-card .mc-ground { color: #35516d; }

    .groups-wrap {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(15, 34, 54, 0.06);
      overflow: hidden;
    }

    .groups-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f8f7ff 0%, #fff 100%);
    }

    .groups-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .groups-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .groups-body {
      padding: 12px;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(230px, 1fr));
      gap: 10px;
    }

    .group-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .group-title {
      margin: 0 0 8px;
      font-size: 0.86rem;
      font-weight: 800;
      color: #28486d;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
      font-size: 0.83rem;
    }

    .team-row:last-child { margin-bottom: 0; }

    .flag {
      width: 1.3rem;
      text-align: center;
      font-size: 1rem;
      line-height: 1;
    }

    @media (max-width: 1100px) {
      .calendar-scroll { max-height: none; }
      .groups-grid { grid-template-columns: repeat(2, minmax(230px, 1fr)); }
    }

    @media (max-width: 650px) {
      .groups-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>2026 世界盃全賽程行事曆（全部場次）</h1>
      <p>可用城市與國家篩選。若選了國家，可再指定「小組第一 / 第二晉級」，下方會只顯示該路線到冠軍賽。</p>
      <div class="toolbar">
        <label for="scope">顯示範圍</label>
        <select id="scope" aria-label="顯示範圍">
          <option value="all">全部場次</option>
          <option value="ny">只看 NY 周邊</option>
          <option value="ny+dallas">NY 周邊 + Dallas</option>
        </select>

        <label for="country">國家</label>
        <select id="country" aria-label="國家選擇">
          <option value="all">全部國家</option>
        </select>

        <label for="advance">晉級情境</label>
        <select id="advance" aria-label="晉級情境" disabled>
          <option value="none">不推演淘汰賽</option>
          <option value="1">小組第一晉級</option>
          <option value="2">小組第二晉級</option>
        </select>
      </div>
      <div class="meta" id="meta"></div>
    </section>

    <section class="pane" id="calendar-pane">
      <header class="pane-head">
        <h2>賽程行事曆</h2>
        <p>依日期排列；若有指定國家與晉級情境，會加上該隊淘汰賽推演場次。</p>
      </header>
      <div class="calendar-scroll">
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
    </section>

    <section class="bracket-wrap" id="bracket-wrap">
      <header class="bracket-head">
        <h2 id="bracket-title">32 強到冠軍賽對戰圖</h2>
        <p id="bracket-subtitle">顯示：32 強 → 16 強 → 8 強 → 4 強 → 冠軍賽（含季軍賽）。</p>
      </header>
      <div class="bracket-scroll">
        <div class="bracket" id="bracket"></div>
      </div>
    </section>

    <section class="groups-wrap" id="groups-wrap">
      <header class="groups-head">
        <h2>各小組國家</h2>
        <p>依 A-L 小組列出隊伍（國旗 + 名稱）。</p>
      </header>
      <div class="groups-body">
        <div class="groups-grid" id="groups-grid"></div>
      </div>
    </section>
  </main>

        .filter((m) => {
          if (state.country === "all") return true;
          if (teamMatchesSelectedCountry(m, state.country)) return true;
          if (state.advance !== "none" && pathSet.has(matchKey(m))) return true;
          return false;
        })
        .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
    }

    function renderMeta(filtered, pathMatches) {
      const allDates = matches.map((m) => m.date).sort();
      const dateMin = allDates[0];
      const dateMax = allDates[allDates.length - 1];

      const pathInfo = (state.country !== "all" && state.advance !== "none")
        ? `；推演路線 ${pathMatches.length} 場`
        : "";

      document.getElementById("meta").textContent = `目前顯示 ${filtered.length} 場（全賽期 ${dateMin} ~ ${dateMax}，總場次 ${matches.length} 場）${pathInfo}`;
    }

    function renderCalendar(filtered) {
      const grid = document.getElementById("calendar-grid");
      grid.innerHTML = "";

      const byDate = new Map();
      filtered.forEach((m) => {
        if (!byDate.has(m.date)) byDate.set(m.date, []);
        byDate.get(m.date).push(m);
      });

      const allDates = matches.map((m) => m.date).sort();
      const min = toDateObj(allDates[0]);
      const max = toDateObj(allDates[allDates.length - 1]);

      for (let d = new Date(min); d <= max; d.setDate(d.getDate() + 1)) {
        const dateStr = formatDate(d);
        const events = sorted(byDate.get(dateStr) || []);

        const card = document.createElement("article");
        card.className = "day";

        const mini = events.slice(0, 2).map((m) => {
          const cls = classify(m.ground);
          return `<div class="mini"><div class="m-time">${m.time}</div><div class="m-match">${m.team1} vs ${m.team2}</div><div class="m-ground">${m.ground}</div><span class="badge ${cls}">${badgeText(cls)}</span></div>`;
        }).join("");

        const more = events.length > 2 ? `<div class="more">+ 還有 ${events.length - 2} 場</div>` : "";

        card.innerHTML = `
          <p class="dow">${weekDays[d.getDay()]}</p>
          <p class="date">${dateStr}</p>
          <p class="count">${events.length} 場</p>
          ${events.length ? mini + more : '<div class="empty">無符合範圍場次</div>'}
        `;

        grid.appendChild(card);
      }
    }

    function renderFullBracket() {
      const rounds = [
        "Round of 32",
        "Round of 16",
        "Quarter-final",
        "Semi-final",
        "Final",
        "Match for third place"
      ];

      const bracket = document.getElementById("bracket");
      bracket.className = "bracket full";
      bracket.innerHTML = "";

      rounds.forEach((roundName) => {
        const col = document.createElement("section");
        col.className = "round-col";

        const roundMatches = knockoutByRound[roundName] || [];
        const cards = roundMatches.map((m) => {
          return `<article class="match-card"><div class="mc-time">${m.date} | ${m.time}</div><div class="mc-teams">${m.team1} vs ${m.team2}</div><div class="mc-ground">${m.ground}</div></article>`;
        }).join("");

        col.innerHTML = `<h3 class="round-title">${roundName}（${roundMatches.length} 場）</h3>${cards || '<div class="empty">無場次</div>'}`;
        bracket.appendChild(col);
      });

      document.getElementById("bracket-title").textContent = "32 強到冠軍賽對戰圖";
      document.getElementById("bracket-subtitle").textContent = "顯示：32 強 → 16 強 → 8 強 → 4 強 → 冠軍賽（含季軍賽）。";
    }

    function renderPathBracket(pathMatches) {
      const bracket = document.getElementById("bracket");
      bracket.className = "bracket";
      bracket.innerHTML = "";

      roundsForPath.forEach((roundName) => {
        const col = document.createElement("section");
        col.className = "round-col";
        const m = pathMatches.find((x) => x.round === roundName);
        col.innerHTML = `<h3 class="round-title">${roundName}</h3>${m ? `<article class="match-card"><div class="mc-time">${m.date} | ${m.time}</div><div class="mc-teams">${m.team1} vs ${m.team2}</div><div class="mc-ground">${m.ground}</div></article>` : '<div class="empty">此路線無對應場次</div>'}`;
        bracket.appendChild(col);
      });

      const groupLabel = state.advance === "1" ? "小組第一" : "小組第二";
      document.getElementById("bracket-title").textContent = `${state.country}（${groupLabel}）晉級路線`;
      document.getElementById("bracket-subtitle").textContent = "只顯示該隊從 32 強到冠軍賽可能路線。";
    }

    function renderGroups() {
      const grid = document.getElementById("groups-grid");
      grid.innerHTML = "";

      const groups = {};
      teamsMeta.forEach((t) => {
        if (!t.group) return;
        if (!groups[t.group]) groups[t.group] = [];
        groups[t.group].push(t);
      });

      Object.keys(groups).sort().forEach((group) => {
        const card = document.createElement("section");
        card.className = "group-card";

        const rows = groups[group].map((t) => {
          const flag = t.flag_icon || "🏳️";
          return `<div class="team-row"><span class="flag">${flag}</span><span>${t.name}</span></div>`;
        }).join("");

        card.innerHTML = `<h3 class="group-title">Group ${group}</h3>${rows}`;
        grid.appendChild(card);
      });
    }

    function render() {
      const pathMatches = projectedPath(state.country, state.advance);
      const filtered = getFiltered(pathMatches);
      renderMeta(filtered, pathMatches);
      renderCalendar(filtered);

      if (state.country !== "all" && state.advance !== "none") {
        renderPathBracket(pathMatches);
      } else {
        renderFullBracket();
      }
    }

    function syncAdvanceAvailability() {
      const advance = document.getElementById("advance");
      if (state.country === "all") {
        state.advance = "none";
        advance.value = "none";
        advance.disabled = true;
      } else {
        advance.disabled = false;
      }
    }

    buildCountryOptions();
    renderGroups();

    document.getElementById("scope").addEventListener("change", (e) => {
      state.scope = e.target.value;
      render();
    });

    document.getElementById("country").addEventListener("change", (e) => {
      state.country = e.target.value;
      syncAdvanceAvailability();
      render();
    });

    document.getElementById("advance").addEventListener("change", (e) => {
      state.advance = e.target.value;
      render();
    });

    syncAdvanceAvailability();
    render();
  </script>
</body>
</html>
